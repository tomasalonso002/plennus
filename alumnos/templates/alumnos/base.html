{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{%block title%} Plennus {%endblock%}</title>
    {% tailwind_css %}
</head>
<body>
    <nav>
        {% if user.is_authenticated %}
        <a href="{% url 'crear_alumno' %}">Crear alumnos</a>
        <a href="{% url 'mostrar_alumnos' %}">Mostrar alumnos</a>
        <form method="POST" action="{% url 'logout'%}">
            {%csrf_token%}
            <button type="submit">Cerrar Sesion</button>
        </form>

        {%else%}
        <a href="{% url 'login' %}">Iniciar Sesion</a>
        {%endif%}
    </nav>

    {% block body %}
    <!--  -->
    {% endblock %}
</body>
</html>
